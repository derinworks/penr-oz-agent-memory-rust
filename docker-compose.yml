services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: penr-oz-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    networks:
      - memory-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.1.44
    container_name: penr-oz-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - memory-net
    profiles:
      - ollama   # only started when: docker compose --profile ollama up
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:11434/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  ollama_data:

networks:
  memory-net:
    driver: bridge
